name: Lint

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shell:
    name: Shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      # severity=error catches genuine bugs / parse errors without failing on
      # the intentional style of these build scripts.
      - name: Run shellcheck
        run: shellcheck --severity=error build.sh setup.sh

  python:
    name: Python patches (syntax)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile-check patch scripts
        run: python -m py_compile patches/*.py
